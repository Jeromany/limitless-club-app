<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <title>Limitless Journeys Club</title>
    <link rel="stylesheet" href="style.css">
    <!-- Telegram Mini App Script (We will activate this later) -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <header class="app-header">
        <h1>LIMITLESS JOURNEYS</h1>
        <p class="tagline">"Trade Without Limits"</p>
    </header>

    <main class="app-content">
        <section class="card daily-briefing">
            <h2>📊 Daily Gold Briefing</h2>
            <div id="briefing-content">
                <p class="loading">Loading today's analysis...</p>
            </div>
        </section>

        <section class="card menu">
            <h2>🛠️ Tools</h2>
            <button class="menu-btn" onclick="alert('Trading Journal coming soon!')">📓 Trading Journal</button>
            <button class="menu-btn" onclick="alert('Fibonacci Calculator coming soon!')">📐 Fib Calculator</button>
            <button class="menu-btn" onclick="alert('Asian Session Tracker coming soon!')">🌏 Asian Session</button>
        </section>
    </main>

    <footer class="app-footer">
        <p>© 2026 Limitless Journeys Club</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
